<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic To-Do App</title>
    <meta name="description" content="A beautiful and functional To-Do application.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <div class="todo-wrapper glass-effect">
            <header>
                <h1>My Tasks</h1>
                <p>Stay organized, stay creative.</p>
            </header>

            <form id="todo-form" class="input-section">
                <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off" required>
                <button type="submit" id="add-btn">Add</button>
            </form>

            <ul id="todo-list" class="todo-list">
                <!-- Tasks will be injected here by JS -->
            </ul>

            <div class="footer-info">
                <span id="task-count">0 tasks</span>
                <button type="button" id="clear-all-btn" class="clear-btn">Clear All</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
